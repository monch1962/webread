name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            ext: tar.gz
            archive: tar czf
            suffix: linux-amd64

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            ext: tar.gz
            archive: tar czf
            suffix: linux-arm64

          - target: x86_64-apple-darwin
            os: macos-13
            ext: tar.gz
            archive: tar czf
            suffix: macos-amd64

          - target: aarch64-apple-darwin
            os: macos-latest
            ext: tar.gz
            archive: tar czf
            suffix: macos-arm64

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: zip
            archive: 7z a -tzip
            suffix: windows-amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip (non-Windows)
        if: matrix.os != 'windows-latest'
        run: strip target/${{ matrix.target }}/release/webread

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          BINARY="webread-${{ matrix.suffix }}"
          mkdir -p "$BINARY"
          cp target/${{ matrix.target }}/release/webread "$BINARY/"
          cp README.md HERMES.md "$BINARY/"
          ${{ matrix.archive }} "$BINARY.${{ matrix.ext }}" "$BINARY"
          echo "ASSET=$BINARY.${{ matrix.ext }}" >> $GITHUB_ENV

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          $BINARY = "webread-${{ matrix.suffix }}"
          New-Item -ItemType Directory -Force -Path $BINARY
          Copy-Item "target/${{ matrix.target }}/release/webread.exe" "$BINARY/"
          Copy-Item "README.md", "HERMES.md" "$BINARY/"
          Compress-Archive -Path "$BINARY/*" -DestinationPath "$BINARY.zip"
          echo "ASSET=$BINARY.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: webread-${{ matrix.suffix }}
          path: ${{ env.ASSET }}

  docker:
    name: Docker (ghcr.io)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f -name '*.tar.gz' -o -name '*.zip' | while read f; do
            sha256sum "$f" >> checksums.txt
          done
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: webread ${{ github.ref_name }}
          body: |
            ## webread ${{ github.ref_name }}

            Downloads for all platforms:

            | Platform | Architecture | Download | Docker |
            |----------|-------------|----------|--------|
            | Linux | x86_64 | `webread-linux-amd64.tar.gz` | `ghcr.io/monch1962/webread:latest` |
            | Linux | ARM64 | `webread-linux-arm64.tar.gz` | `ghcr.io/monch1962/webread:latest` |
            | macOS | Intel | `webread-macos-amd64.tar.gz` | — |
            | macOS | Apple Silicon | `webread-macos-arm64.tar.gz` | — |
            | Windows | x86_64 | `webread-windows-amd64.zip` | — |

            ### Usage
            ```bash
            # Binary
            tar xzf webread-linux-amd64.tar.gz
            ./webread-linux-amd64/webread get https://example.com

            # Docker
            docker pull ghcr.io/monch1962/webread:latest
            docker run ghcr.io/monch1962/webread get https://example.com
            ```

            See [README.md](https://github.com/monch1962/webread) for full documentation.
          files: |
            artifacts/*/*.tar.gz
            artifacts/*/*.zip
            artifacts/checksums.txt
          draft: ${{ github.ref_name == 'v0.1.0' }}
